# UART Display Configuration
# /etc/openmediavault/uartdisplay.conf

[uart]
# Serial device for UART display
uart_device = /dev/ttyUSB0

# Baud rate (standard: 9600, 19200, 38400, 57600, 115200)
uart_baudrate = 115200

# Read timeout in seconds
uart_timeout = 1

[display]
# Update interval in seconds
update_interval = 10

# Mount point to monitor for array status
mount_point = /srv
